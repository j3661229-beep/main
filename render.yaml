services:
  # Backend Web Service
  - type: web
    name: agrimart-backend
    runtime: node
    rootDir: agrimart-backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: agrimart-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agrimart-redis
          property: connectionString

  # Admin Static Site
  - type: web
    name: agrimart-admin
    runtime: static
    rootDir: agrimart-admin
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: agrimart-backend
          property: url
        suffix: /api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

