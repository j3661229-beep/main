name: agrimart
description: AgriMart — Indian Agricultural Marketplace for Farmers & Suppliers
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP & API
  dio: ^5.7.0
  pretty_dio_logger: ^1.3.1

  # Local storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.67.0
  smooth_page_indicator: ^1.1.0

  # Image handling
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Location
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Payment
  razorpay_flutter: ^1.3.7

  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2
  google_sign_in: ^6.2.1

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  path_provider: ^2.1.5
  connectivity_plus: ^6.0.3

  # AI / Camera
  camera: ^0.11.0+2

  cupertino_icons: ^1.0.8
  onesignal_flutter: ^5.4.6

  # Voice-to-Text & Text-to-Speech
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.5

  # Animations
  animate_do: ^3.3.4
  in_app_review: ^2.0.11
  firebase_crashlytics: ^4.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.12
  hive_generator: ^2.0.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
